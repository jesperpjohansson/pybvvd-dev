site_name: pybvvd
site_description: Python SDK for Bolagsverket's Värdefulla Datamängder API.
site_url: https://pybvvd.readthedocs.io/
repo_url: https://github.com/jesperpjohansson/pybvvd-dev
repo_name: jesperpjohansson/pybvvd-dev
theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light blue
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Fira Code
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Usage: usage.md
  - API Reference: api-reference.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            show_source: false
            show_bases: false
            docstring_style: numpy
            docstring_section_style: table
            merge_init_into_class: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            annotations_path: source
            line_length: 88
            show_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

copyright: Copyright &copy; 2026 Jesper Johansson

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jesperpjohansson/pybvvd-dev

extra_css:
  - assets/css/table.css
