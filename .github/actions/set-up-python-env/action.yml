name: Set Up Python Environment
description: Set up Python and optionally upgrade pip.

inputs:
  python-version:
    description: Python version to install.
    default: "3.12"
  upgrade-pip:
    description: Whether to upgrade pip.
    default: "true"
  cache-dependency-path:
    description: Requirement files used to key the pip cache.
    default: |
      pyproject.toml
      requirements/*.txt

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Upgrade pip
      if: ${{ inputs.upgrade-pip == 'true' }}
      run: python -m pip install --upgrade pip
      shell: bash
