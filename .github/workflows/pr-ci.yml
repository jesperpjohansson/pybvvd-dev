name: Pull Request CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call-build-workflow:
    name: Build
    uses: ./.github/workflows/build.yml

  call-docs-workflow:
    name: Docs
    uses: ./.github/workflows/docs.yml

  call-lint-workflow:
    name: Lint
    uses: ./.github/workflows/lint.yml

  call-typecheck-workflow:
    name: Typecheck
    uses: ./.github/workflows/typecheck.yml

  call-test-workflow:
    name: Test
    uses: ./.github/workflows/test.yml

  ok-flag:
    name: OK Flag
    needs:
      - call-build-workflow
      - call-docs-workflow
      - call-lint-workflow
      - call-typecheck-workflow
      - call-test-workflow
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail unless every job succeeded
        if: |
          needs.call-build-workflow.result != 'success' ||
          needs.call-docs-workflow.result != 'success' ||
          needs.call-lint-workflow.result != 'success' ||
          needs.call-typecheck-workflow.result != 'success' ||
          needs.call-test-workflow.result != 'success'
        run: exit 1
